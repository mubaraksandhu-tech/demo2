<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in</title>
<style>
  :root {
    --ink: #14171a;
    --paper: #f7f6f3;
    --line: #dcd8d0;
    --accent: #1f4b43;
    --accent-soft: #e5efec;
    --error: #a13d2a;
    --font-display: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    font-family: var(--font-body);
    color: var(--ink);
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 40px 36px;
    position: relative;
  }

  .mark {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent);
    margin-bottom: 22px;
    position: relative;
  }
  .mark::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: var(--paper);
  }

  h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 400;
    margin: 0 0 6px;
    letter-spacing: 0.2px;
  }

  .sub {
    font-size: 13.5px;
    color: #6b6560;
    margin: 0 0 28px;
    line-height: 1.5;
  }

  form { display: flex; flex-direction: column; gap: 14px; }

  label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #6b6560;
    margin-bottom: 6px;
    display: block;
  }

  .field { display: flex; flex-direction: column; }

  input[type="email"], input[type="password"] {
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 11px 12px;
    font-size: 14.5px;
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 3px;
    font-family: var(--font-body);
    font-size: 14.5px;
    font-weight: 600;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 12px;
    margin-top: 6px;
  }
  .btn-primary:hover { background: #163a33; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-link {
    background: none;
    color: var(--accent);
    padding: 0;
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-top: 4px;
  }

  .toggle {
    text-align: center;
    font-size: 13.5px;
    color: #6b6560;
    margin-top: 22px;
  }

  .message {
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 3px;
    margin-bottom: 16px;
    display: none;
    line-height: 1.4;
  }
  .message.error { display: block; background: #f8ece8; color: var(--error); }
  .message.success { display: block; background: var(--accent-soft); color: var(--accent); }

  .signed-in { text-align: center; }
  .signed-in .avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 20px;
    margin: 0 auto 16px;
  }
  .signed-in .email-display {
    font-size: 14.5px;
    color: var(--ink);
    margin-bottom: 24px;
    word-break: break-all;
  }

  .hidden { display: none !important; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #c9c2b8; display: inline-block; margin-right: 6px;
  }
  .config-warning {
    font-size: 12px; color: var(--error); background: #f8ece8;
    padding: 10px 12px; border-radius: 3px; margin-bottom: 18px; line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card">
  <div class="mark"></div>

  <div id="configWarning" class="config-warning hidden">
    Firebase config not set. Open this file and fill in <code>firebaseConfig</code> near the bottom of the script.
  </div>

  <div id="message" class="message"></div>

  <!-- Signed out: login/signup -->
  <div id="authView">
    <h1 id="formTitle">Sign in</h1>
    <p class="sub" id="formSub">Welcome back. Enter your details to continue.</p>

    <form id="authForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" minlength="6" />
      </div>
      <div class="row">
        <span></span>
        <button type="button" class="btn-link" id="forgotBtn">Forgot password?</button>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>
    </form>

    <p class="toggle">
      <span id="toggleText">Don't have an account?</span>
      <button type="button" class="btn-link" id="toggleBtn">Create one</button>
    </p>
  </div>

  <!-- Signed in -->
  <div id="signedInView" class="signed-in hidden">
    <div class="avatar" id="avatarInitial">•</div>
    <div class="email-display" id="userEmail"></div>
    <button class="btn-primary" id="signOutBtn" style="width:100%;">Sign out</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    sendPasswordResetEmail,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // ---------------------------------------------------------------
  // 1. Paste your Firebase project config here.
  //    Get this from: Firebase Console > Project Settings > General
  //    > Your apps > SDK setup and configuration.
  // ---------------------------------------------------------------
 // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBjnLNN8BLm9sEJluPnlDhHwS3G9fGTFoA",
  authDomain: "fir-def09.firebaseapp.com",
  projectId: "fir-def09",
  storageBucket: "fir-def09.firebasestorage.app",
  messagingSenderId: "995080563939",
  appId: "1:995080563939:web:dec983e691c0d065aee9d6",
  measurementId: "G-SSE2P4WNEH"
};
  const isConfigured = !Object.values(firebaseConfig).some(v => v.startsWith("YOUR_"));
  if (!isConfigured) {
    document.getElementById("configWarning").classList.remove("hidden");
  }

  let app, auth;
  if (isConfigured) {
    app = initializeApp(firebaseConfig);
    auth = getAuth(app);
  }

  // ---- UI state ----
  let mode = "signin"; // or "signup"

  const authView = document.getElementById("authView");
  const signedInView = document.getElementById("signedInView");
  const authForm = document.getElementById("authForm");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const formTitle = document.getElementById("formTitle");
  const formSub = document.getElementById("formSub");
  const submitBtn = document.getElementById("submitBtn");
  const toggleBtn = document.getElementById("toggleBtn");
  const toggleText = document.getElementById("toggleText");
  const forgotBtn = document.getElementById("forgotBtn");
  const signOutBtn = document.getElementById("signOutBtn");
  const messageEl = document.getElementById("message");
  const userEmailEl = document.getElementById("userEmail");
  const avatarInitial = document.getElementById("avatarInitial");

  function showMessage(text, type) {
    messageEl.textContent = text;
    messageEl.className = "message " + type;
  }
  function clearMessage() {
    messageEl.className = "message";
    messageEl.textContent = "";
  }

  function setMode(next) {
    mode = next;
    clearMessage();
    if (mode === "signin") {
      formTitle.textContent = "Sign in";
      formSub.textContent = "Welcome back. Enter your details to continue.";
      submitBtn.textContent = "Sign in";
      toggleText.textContent = "Don't have an account?";
      toggleBtn.textContent = "Create one";
      forgotBtn.classList.remove("hidden");
    } else {
      formTitle.textContent = "Create account";
      formSub.textContent = "Set an email and password to get started.";
      submitBtn.textContent = "Create account";
      toggleText.textContent = "Already have an account?";
      toggleBtn.textContent = "Sign in";
      forgotBtn.classList.add("hidden");
    }
  }

  toggleBtn.addEventListener("click", () => setMode(mode === "signin" ? "signup" : "signin"));

  authForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!isConfigured) {
      showMessage("Add your Firebase config before signing in.", "error");
      return;
    }
    clearMessage();
    submitBtn.disabled = true;
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    try {
      if (mode === "signin") {
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        await createUserWithEmailAndPassword(auth, email, password);
      }
    } catch (err) {
      showMessage(friendlyError(err), "error");
    } finally {
      submitBtn.disabled = false;
    }
  });

  forgotBtn.addEventListener("click", async () => {
    const email = emailInput.value.trim();
    if (!email) {
      showMessage("Enter your email above first, then click Forgot password.", "error");
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      showMessage("Password reset email sent. Check your inbox.", "success");
    } catch (err) {
      showMessage(friendlyError(err), "error");
    }
  });

  signOutBtn.addEventListener("click", async () => {
    await signOut(auth);
  });

  function friendlyError(err) {
    const code = err.code || "";
    const map = {
      "auth/invalid-email": "That email address doesn't look right.",
      "auth/user-not-found": "No account found with that email.",
      "auth/wrong-password": "Incorrect password.",
      "auth/invalid-credential": "Incorrect email or password.",
      "auth/email-already-in-use": "An account with that email already exists.",
      "auth/weak-password": "Password should be at least 6 characters.",
      "auth/too-many-requests": "Too many attempts. Try again in a moment."
    };
    return map[code] || "Something went wrong. Please try again.";
  }

  if (isConfigured) {
    onAuthStateChanged(auth, (user) => {
      clearMessage();
      if (user) {
        authView.classList.add("hidden");
        signedInView.classList.remove("hidden");
        userEmailEl.textContent = user.email;
        avatarInitial.textContent = (user.email || "?").charAt(0).toUpperCase();
      } else {
        authView.classList.remove("hidden");
        signedInView.classList.add("hidden");
        authForm.reset();
      }
    });
  }

  setMode("signin");
</script>

</body>
</html>
